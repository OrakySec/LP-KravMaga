version: '3'

services:
  presell-kravmaga:
    image: ghcr.io/orakysec/lp-kravmaga:latest
    container_name: presell-kravmaga
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.presell-kravmaga.rule=Host(`kravmaga.ykaromarques.com`)"
      - "traefik.http.routers.presell-kravmaga.entrypoints=websecure"
      - "traefik.http.routers.presell-kravmaga.tls.certresolver=letsencryptresolver"
      - "traefik.http.services.presell-kravmaga.loadbalancer.server.port=80"
    networks:
      - YkaroNET

networks:
  YkaroNET:
    external: true
