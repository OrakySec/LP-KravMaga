<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18137688084"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'AW-18137688084');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACESSO RESTRITO | PROTOCOLO CAVEIRA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #ff0000;
            --deep-red: #8b0000;
            --dark-bg: #050505;
            --text-white: #ffffff;
            --card-bg: rgba(10, 10, 10, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: var(--dark-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* Background imersivo */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at center, rgba(255, 0, 0, 0.15) 0%, rgba(0, 0, 0, 0.8) 70%),
                url('caveira_tactical_bg_1778208336064.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Ruído/Grit tático */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            text-align: center;
            padding: 60px 30px;
            background: var(--card-bg);
            border: 2px solid var(--primary-red);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.15), 
                        inset 0 0 20px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Detalhes nos cantos para dar um ar de HUD */
        .container::before, .container::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-white);
            pointer-events: none;
            opacity: 0.3;
        }

        .container::before {
            top: -2px;
            left: -2px;
            border-right: none;
            border-bottom: none;
        }

        .container::after {
            bottom: -2px;
            right: -2px;
            border-left: none;
            border-top: none;
        }

        .alert-tag {
            background: var(--primary-red);
            color: white;
            font-family: 'Bebas Neue', sans-serif;
            padding: 4px 12px;
            font-size: 1rem;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 25px;
            transform: skewX(-10deg);
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            color: var(--text-white);
            line-height: 0.9;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px rgba(255, 0, 0, 0.3);
        }

        h1 span {
            color: var(--primary-red);
            display: block;
            font-size: 3.8rem;
        }

        .description {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            line-height: 1.6;
            font-weight: 700;
        }

        .btn-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 22px;
            background: linear-gradient(to bottom, #ff0000, #8b0000);
            color: white;
            text-decoration: none;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 3px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 0 #5a0000, 0 10px 20px rgba(0,0,0,0.5);
            border-radius: 4px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #5a0000, 0 15px 25px rgba(255,0,0,0.3);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #5a0000;
        }

        .btn-secondary {
            display: inline-block;
            margin-top: 10px;
            color: #444;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .btn-secondary:hover {
            color: #666;
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading Overlay */
        #loader {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .scan-line {
            width: 250px;
            height: 2px;
            background: var(--primary-red);
            box-shadow: 0 0 20px var(--primary-red);
            position: relative;
            overflow: hidden;
        }

        .scan-line::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: white;
            animation: scan 1.2s infinite;
        }

        @keyframes scan {
            to { left: 100%; }
        }

        .loader-text {
            font-family: 'Bebas Neue', sans-serif;
            color: white;
            margin-top: 20px;
            font-size: 1.2rem;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="noise"></div>

    <div class="container" id="main-content">
        <div class="alert-tag">AVISO DE SEGURANÇA</div>
        
        <h1>Acesso<span>Restrito</span></h1>
        
        <p class="description">
            Este conteúdo contém técnicas de combate e autodefesa de alto impacto. 
            É obrigatório ter mais de 18 anos para prosseguir.
        </p>

        <div class="btn-wrapper">
            <button class="btn" onclick="startRedirect()">Sim, tenho +18 anos</button>
        </div>
        
        <a href="javascript:void(0)" class="btn-secondary">Sair agora</a>
    </div>

    <div id="loader">
        <div class="scan-line"></div>
        <p class="loader-text">VALIDANDO ACESSO TÁTICO...</p>
    </div>

    <script>
        function startRedirect() {
            document.getElementById('main-content').style.opacity = '0';
            document.getElementById('main-content').style.transition = '0.3s';
            
            setTimeout(() => {
                document.getElementById('loader').style.display = 'flex';
                
                const target = "https://go.hotmart.com/U105737133Y?ap=44cd";
                
                setTimeout(() => {
                    window.location.href = target;
                }, 1800);
            }, 300);
        }
    </script>
</body>
</html>
